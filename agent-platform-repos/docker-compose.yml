version: "3.9"

# 本地开发一键启动：5 个 Python 服务 + 所有基础设施
# 生产环境各服务独立部署，不使用此文件

services:

  # ── Python 服务 ───────────────────────────────────────────

  agent-service:
    build:
      context: .
      dockerfile: agent-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      APP_ENV: development
      AI_CORE_URL: http://ai-core-service:8002
      MEMORY_RAG_URL: http://memory-rag-service:8003
      MCP_URL: http://mcp-service:8004
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_STRONG_MODEL: gpt-4o
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
    depends_on:
      - ai-core-service
      - memory-rag-service
      - mcp-service
      - redis

  ai-core-service:
    build:
      context: .
      dockerfile: ai-core-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      APP_ENV: development
      LLM_DEFAULT_MODEL: openai/gpt-4o-mini
      LLM_STRONG_MODEL: openai/gpt-4o
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}

  memory-rag-service:
    build:
      context: .
      dockerfile: memory-rag-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      APP_ENV: development
      MILVUS_HOST: milvus-standalone
      MILVUS_PORT: 19530
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      EMBEDDING_MODEL: BAAI/bge-m3
      RERANK_MODEL: BAAI/bge-reranker-v2-m3
      EMBEDDING_DEVICE: cpu
      AI_CORE_URL: http://ai-core-service:8002
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}
    depends_on:
      - milvus-standalone
      - qdrant
      - redis
      - ai-core-service

  mcp-service:
    build:
      context: .
      dockerfile: mcp-service/Dockerfile
    ports:
      - "8004:8004"
    environment:
      APP_ENV: development
      INTERNAL_GATEWAY_URL: ${INTERNAL_GATEWAY_URL:-http://mock-gateway:8080}
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-}

  # ── 基础设施 ──────────────────────────────────────────────

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  milvus-standalone:
    image: milvusdb/milvus:v2.4.6
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio_data:/minio_data

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_SECRET: change-me-in-production
      SALT: change-me-in-production
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  milvus_data:
  etcd_data:
  minio_data:
  qdrant_data:
  postgres_data:
